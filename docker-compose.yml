version: '3.8'

services:
  db:
    image: mysql:8.0
    env_file:
      - .env
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: .
    command: sh -c "python manage.py migrate && gunicorn event_management.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "${WEB_PORT:-8000}:8000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  mysql_data:
